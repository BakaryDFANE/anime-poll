<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Sondage anime (anonyme)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;800&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="public-page">
  <main class="public-shell">
    <header id="titleWrap" class="hero-panel">
      <div class="hero-kicker">ANIME POLL // LIVE MATCH</div>
      <h1 id="siteTitle" data-text="Sondage Animes">Sondage Animes</h1>
      <p class="subtitle">Vote anonymement pour ton anime préféré et regarde le classement s'allumer en direct.</p>
    </header>

    <section id="pollArea" class="vote-zone" aria-live="polite">
      <div id="loading" class="loading-panel">Chargement du sondage...</div>
    </section>

    <section id="resultsArea" class="results-panel" hidden>
      <div class="section-label">Classement</div>
      <h2>Classement actuel</h2>
      <div id="results"></div>
    </section>

    <section id="commentsArea" class="comments-panel">
      <div class="section-label">Commentaires</div>
      <h2>Laisse ton avis</h2>
      <form id="commentForm" class="comment-form">
        <input id="commentAuthor" type="text" placeholder="Pseudo (optionnel — anonyme par défaut)" maxlength="50">
        <textarea id="commentText" placeholder="Écris ton commentaire..." maxlength="500" rows="3" required></textarea>
        <button type="submit" class="primary">Envoyer</button>
      </form>
      <div id="commentsList" class="comments-list"></div>
    </section>
  </main>
  <script src="shared.js"></script>
  <script src="app.js"></script>
</body>
</html>
