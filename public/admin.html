<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin - Sondage Animes</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <h1>Administration</h1>
    <p>Connectez-vous pour modifier le sondage.</p>
    
    <div id="loginArea">
      <label>Utilisateur <input id="adminUser" placeholder="admin"></label>
      <label>Mot de passe <input id="adminPass" type="password" placeholder="mot de passe"></label>
      <button id="loginBtn" class="primary">Se connecter</button>
    </div>

    <section id="pollEditor" hidden>
      <h2>Modifier le sondage</h2>
      <div id="currentPoll"></div>

      <div id="noPollState" class="empty-state" style="margin:12px 0;">
        <p>Aucun sondage disponible. Créez un sondage pour pouvoir ajouter des animés.</p>
      </div>

      <div id="createPollArea" style="display:none;">
        <h3>Créer un sondage</h3>
        <label>Id du sondage <input id="newPollId" placeholder="general-anime"></label>
        <label>Titre <input id="newPollTitle" placeholder="Quel est ton anime préféré ?"></label>

        <button id="createPollBtn" class="primary">Créer le sondage</button>
      </div>

      <div id="optionArea" style="display:none;">
        <label>Nouvelle option <input id="newOption" placeholder="Nom de l'option"></label>

        <label>Lien de l'image (URL optionnelle)
          <input id="optionImage" type="text" placeholder="https://exemple.com/image.jpg">
        </label>

        <button id="addOption" class="primary">Ajouter l'option</button>
        <button id="resetVotes" class="ghost">Réinitialiser les votes</button>
        <button id="logoutBtn" class="ghost">Se déconnecter</button>
      </div>
    </section>


    <p><a href="/">Retour au site public</a></p>
  </main>
  <script src="admin.js"></script>
</body>

</html>
